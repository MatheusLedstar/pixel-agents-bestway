const CHARS=[CHAR_0,CHAR_1,CHAR_2,CHAR_3,CHAR_4,CHAR_5];
const PC_FRAMES=[PC_ON_1,PC_ON_2,PC_ON_3];

const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const tooltip=document.getElementById('tooltip');

const COLS=50, ROWS=32, TILE=16;
const MAP_W=COLS*TILE, MAP_H=ROWS*TILE;

let camX=0, camY=0, camZoom=1.0;
let isDragging=false, dragStartX=0, dragStartY=0, dragCamX=0, dragCamY=0;
let dragMoved=false;

const imgCache={};
let imagesLoaded=0, totalImages=0;

function loadImg(src) {
    return new Promise(resolve => {
        if(imgCache[src]) { resolve(imgCache[src]); return; }
        totalImages++;
        const img=new Image();
        img.onload=()=>{ imgCache[src]=img; imagesLoaded++; resolve(img); };
        img.onerror=()=>{ imagesLoaded++; resolve(null); };
        img.src=src;
    });
}

async function preloadAll() {
    const srcs=[FLOOR_0,WALL_0,...CHARS,DESK_FRONT,...PC_FRAMES,
        CHAIR_FRONT,CHAIR_BACK,BOOKSHELF,PLANT,SOFA_FRONT,WHITEBOARD,
        COFFEE_TABLE,COFFEE,TABLE_FRONT,DOUBLE_BOOKSHELF,LARGE_PLANT,
        CLOCK,BIN,CACTUS,SMALL_PAINTING];
    await Promise.all(srcs.map(loadImg));
}

const rooms=[
    {id:'planning',  name:'PLANNING ROOM',  x:1,  y:1,  w:11, h:13, door:'down', color:'#A78BFA'},
    {id:'coding',    name:'CODING LAB',     x:13, y:1,  w:13, h:13, door:'down', color:'#34D399'},
    {id:'testing',   name:'TEST LAB',       x:27, y:1,  w:11, h:13, door:'down', color:'#FBBF24'},
    {id:'deploying', name:'DEPLOY CENTER',  x:39, y:1,  w:10, h:13, door:'down', color:'#FB923C'},
    {id:'comms',     name:'COMMS HUB',      x:1,  y:18, w:11, h:13, door:'up',   color:'#60A5FA'},
    {id:'lounge',    name:'LOUNGE',         x:13, y:18, w:13, h:13, door:'up',   color:'#9CA3AF'},
    {id:'library',   name:'LIBRARY',        x:27, y:18, w:11, h:13, door:'up',   color:'#22D3EE'},
    {id:'workshop',  name:'DEBUG WORKSHOP', x:39, y:18, w:10, h:13, door:'up',   color:'#F472B6'},
];

const floorMap=Array.from({length:ROWS},()=>Array(COLS).fill(0));
const wallMap=Array.from({length:ROWS},()=>Array(COLS).fill(false));
const furnitureMap=Array.from({length:ROWS},()=>Array(COLS).fill(null));
const seats=[];

function buildMap() {
    for(let c=0;c<COLS;c++) { wallMap[0][c]=true; wallMap[ROWS-1][c]=true; }
    for(let r=0;r<ROWS;r++) { wallMap[r][0]=true; wallMap[r][COLS-1]=true; }
    for(let r=14;r<=17;r++) for(let c=1;c<COLS-1;c++) floorMap[r][c]=1;
    for(const room of rooms) {
        const x0=room.x, y0=room.y, x1=x0+room.w-1, y1=y0+room.h-1;
        for(let c=x0;c<=x1;c++) { wallMap[y0][c]=true; wallMap[y1][c]=true; }
        for(let r=y0;r<=y1;r++) { wallMap[r][x0]=true; wallMap[r][x1]=true; }
        for(let r=y0+1;r<y1;r++) for(let c=x0+1;c<x1;c++) floorMap[r][c]=2;
        const dc=(room.door==='down'||room.door==='up') ? x0+Math.floor(room.w/2) : y0+Math.floor(room.h/2);
        if(room.door==='down') { wallMap[y1][dc]=false; wallMap[y1][dc-1]=false; }
        else if(room.door==='up') { wallMap[y0][dc]=false; wallMap[y0][dc-1]=false; }
        placeFurniture(room);
    }
}

function placeFurniture(room) {
    const x0=room.x+1, y0=room.y+1, iw=room.w-2, ih=room.h-2;
    const mid=x0+Math.floor(iw/2);
    switch(room.id) {
    case 'coding': {
        const cs=Math.floor(iw/4), rs=Math.floor(ih/3);
        for(let col=0;col<3;col++) for(let row=0;row<2;row++) {
            const cx=x0+cs*(col+1), cy=y0+rs*(row+1);
            furnitureMap[cy-1][cx]='monitor'; furnitureMap[cy][cx]='desk';
            furnitureMap[cy+1][cx]='chair_back';
            seats.push({x:cx,y:cy+1,dir:'up',room:room.id});
        }
        furnitureMap[y0+1][x0+1]='plant';
        break;
    }
    case 'planning': {
        furnitureMap[y0+1][mid]='whiteboard'; furnitureMap[y0+1][mid-1]='whiteboard';
        const ty=y0+Math.floor(ih/2);
        for(let dx=-1;dx<=1;dx++) furnitureMap[ty][mid+dx]='table';
        for(let dx=-1;dx<=1;dx++) {
            furnitureMap[ty-1][mid+dx]='chair_back'; furnitureMap[ty+1][mid+dx]='chair_front';
            seats.push({x:mid+dx,y:ty-1,dir:'down',room:room.id});
            seats.push({x:mid+dx,y:ty+1,dir:'up',room:room.id});
        }
        furnitureMap[y0+1][x0+1]='plant';
        break;
    }
    case 'testing': {
        const cs=Math.floor(iw/4), rs=Math.floor(ih/3);
        for(let col=0;col<3;col++) for(let row=0;row<2;row++) {
            const cx=x0+cs*(col+1), cy=y0+rs*(row+1);
            furnitureMap[cy][cx]='desk'; furnitureMap[cy+1][cx]='chair_back';
            seats.push({x:cx,y:cy+1,dir:'up',room:room.id});
        }
        break;
    }
    case 'deploying': {
        for(let dy=0;dy<3;dy++) { furnitureMap[y0+2+dy*2][x0+iw-1]='bookshelf'; }
        const cs=Math.floor(iw/3);
        for(let col=0;col<2;col++) for(let row=0;row<2;row++) {
            const cx=x0+cs*(col+1), cy=y0+3+row*4;
            furnitureMap[cy][cx]='desk'; furnitureMap[cy-1][cx]='monitor';
            furnitureMap[cy+1][cx]='chair_back';
            seats.push({x:cx,y:cy+1,dir:'up',room:room.id});
        }
        break;
    }
    case 'comms': {
        const cs=Math.floor(iw/3), rs=Math.floor(ih/3);
        for(let col=0;col<2;col++) for(let row=0;row<2;row++) {
            const cx=x0+cs*(col+1), cy=y0+rs*(row+1);
            furnitureMap[cy][cx]='desk'; furnitureMap[cy-1][cx]='monitor';
            furnitureMap[cy+1][cx]='chair_back';
            seats.push({x:cx,y:cy+1,dir:'up',room:room.id});
        }
        break;
    }
    case 'lounge': {
        for(let dx=-1;dx<=1;dx++) furnitureMap[y0+2][mid+dx]='sofa';
        furnitureMap[y0+Math.floor(ih/2)][mid]='coffee_table';
        furnitureMap[y0+Math.floor(ih/2)][mid-1]='coffee_table';
        furnitureMap[y0+1][x0+iw-1]='coffee_machine';
        furnitureMap[y0+1][x0+1]='plant';
        const tableY2=y0+Math.floor(ih/2);
        for(let dx=-1;dx<=1;dx++) {
            furnitureMap[tableY2+1][mid+dx]='chair_front';
            seats.push({x:mid+dx,y:tableY2+1,dir:'up',room:room.id});
        }
        seats.push({x:mid-1,y:y0+2,dir:'down',room:room.id});
        seats.push({x:mid+1,y:y0+2,dir:'down',room:room.id});
        break;
    }
    case 'library': {
        for(let dy=1;dy<ih-1;dy+=2) {
            furnitureMap[y0+dy][x0]='bookshelf';
            furnitureMap[y0+dy][x0+iw-1]='bookshelf';
        }
        const tableY3=y0+Math.floor(ih/2);
        furnitureMap[tableY3][mid]='desk'; furnitureMap[tableY3][mid-1]='desk';
        furnitureMap[tableY3][mid+1]='cactus';
        for(let dx=-1;dx<=0;dx++) for(const side of [-1,1]) {
            furnitureMap[tableY3+side][mid+dx]=side===-1?'chair_back':'chair_front';
            seats.push({x:mid+dx,y:tableY3+side,dir:side===-1?'down':'up',room:room.id});
        }
        break;
    }
    case 'workshop': {
        for(let dx=-1;dx<=1;dx++) furnitureMap[y0+2][mid+dx]='desk';
        for(let col=0;col<2;col++) for(let row=0;row<2;row++) {
            const cx=x0+2+col*(iw-4), cy=y0+4+row*4;
            furnitureMap[cy][cx]='chair_front';
            seats.push({x:cx,y:cy,dir:'up',room:room.id});
        }
        break;
    }
    }
}

let agents=[];
let frameCount=0;

function render() {
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    ctx.imageSmoothingEnabled=false;

    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.save();
    const cx=canvas.width/2, cy=canvas.height/2;
    ctx.translate(cx, cy);
    ctx.scale(camZoom, camZoom);
    ctx.translate(-MAP_W/2+camX, -MAP_H/2+camY);

    // Floors
    const floorImg=imgCache[FLOOR_0];
    if(floorImg) {
        for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
            const ft=floorMap[r][c];
            ctx.globalAlpha=1;
            ctx.drawImage(floorImg,c*TILE,r*TILE,TILE,TILE);
            if(ft===1) {
                ctx.globalAlpha=0.15; ctx.fillStyle='#F97316';
                ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
            } else if(ft===2) {
                ctx.globalAlpha=0.05; ctx.fillStyle='#60A5FA';
                ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
            }
        }
    }

    // Walls
    ctx.globalAlpha=1;
    const wallImg=imgCache[WALL_0];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
        if(!wallMap[r][c]) continue;
        if(wallImg) ctx.drawImage(wallImg, 0,0,16,16, c*TILE, r*TILE, TILE, TILE);
        else { ctx.fillStyle='#2a2a4a'; ctx.fillRect(c*TILE, r*TILE, TILE, TILE); }
    }

    // Door glow
    for(const room of rooms) {
        const x0=room.x, y0=room.y, y1=y0+room.h-1;
        const dc=x0+Math.floor(room.w/2);
        ctx.fillStyle=room.color; ctx.globalAlpha=0.3;
        if(room.door==='down') ctx.fillRect((dc-1)*TILE, y1*TILE, TILE*2, TILE);
        else ctx.fillRect((dc-1)*TILE, y0*TILE, TILE*2, TILE);
        ctx.globalAlpha=1;
    }

    // LED strips on room borders
    for(const room of rooms) {
        const rx=room.x*TILE, ry=room.y*TILE;
        const rw=room.w*TILE, rh=room.h*TILE;
        const ledAlpha=0.3+0.1*Math.sin(frameCount*0.05);
        ctx.fillStyle=room.color; ctx.globalAlpha=ledAlpha;
        ctx.fillRect(rx+2, ry+2, rw-4, 2);
        ctx.fillRect(rx+2, ry+rh-4, rw-4, 2);
        ctx.globalAlpha=1;
    }

    // Furniture
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
        const f=furnitureMap[r][c];
        if(f) drawFurniture(f, c*TILE, r*TILE);
    }

    // Room labels
    ctx.globalAlpha=1;
    for(const room of rooms) {
        ctx.font='bold 8px monospace';
        const lx=(room.x+room.w/2)*TILE;
        const ly=(room.door==='down' ? (room.y+2) : (room.y+room.h-2))*TILE+3;
        const tw=ctx.measureText(room.name).width+8;
        ctx.fillStyle='rgba(17,17,22,0.85)';
        ctx.beginPath();
        ctx.roundRect(lx-tw/2, ly-8, tw, 14, 3);
        ctx.fill();
        ctx.strokeStyle=room.color; ctx.lineWidth=1;
        ctx.stroke();
        ctx.fillStyle=room.color; ctx.globalAlpha=0.6;
        ctx.fillRect(lx-tw/2+3, ly+4, tw-6, 2);
        ctx.globalAlpha=1;
        ctx.fillStyle='#fff';
        ctx.textAlign='center';
        ctx.fillText(room.name, lx, ly);
    }

    // Corridor label
    ctx.font='bold 6px monospace';
    ctx.fillStyle='rgba(249,115,22,0.5)';
    ctx.textAlign='center';
    ctx.fillText('C O R R I D O R', (COLS/2)*TILE, 16*TILE-2);

    // Agents (Y-sorted for depth)
    const sortedAgents=[...agents].sort((a,b)=>a.pixelY-b.pixelY);
    for(const agent of sortedAgents) drawAgent(agent);

    ctx.restore();
    frameCount++;
    requestAnimationFrame(render);
}

function drawFurniture(type, px, py) {
    let img;
    switch(type) {
    case 'desk':
        img=imgCache[DESK_FRONT];
        if(img) ctx.drawImage(img, 0,0,48,32, px-TILE, py-TILE/2, TILE*3, TILE*2);
        else { ctx.fillStyle='#6B4C3B'; ctx.fillRect(px,py,TILE,TILE); }
        break;
    case 'monitor':
        img=imgCache[PC_FRAMES[Math.floor(frameCount/20)%3]];
        if(img) ctx.drawImage(img, px, py-TILE, TILE, TILE*2);
        else { ctx.fillStyle='#1E40AF'; ctx.fillRect(px+2,py+2,TILE-4,TILE-4); }
        break;
    case 'chair_front':
        img=imgCache[CHAIR_FRONT];
        if(img) ctx.drawImage(img, px, py, TILE, TILE);
        else { ctx.fillStyle='#7C3AED'; ctx.fillRect(px+3,py+3,TILE-6,TILE-6); }
        break;
    case 'chair_back':
        img=imgCache[CHAIR_BACK];
        if(img) ctx.drawImage(img, px, py, TILE, TILE);
        else { ctx.fillStyle='#5B21B6'; ctx.fillRect(px+3,py+3,TILE-6,TILE-6); }
        break;
    case 'bookshelf':
        img=imgCache[BOOKSHELF];
        if(img) ctx.drawImage(img, px, py, TILE*2, TILE);
        else { ctx.fillStyle='#92400E'; ctx.fillRect(px,py,TILE,TILE); }
        break;
    case 'plant':
        img=imgCache[PLANT];
        if(img) ctx.drawImage(img, px, py-TILE, TILE, TILE*2);
        else { ctx.fillStyle='#16A34A'; ctx.fillRect(px+4,py+2,TILE-8,TILE-4); }
        break;
    case 'sofa':
        img=imgCache[SOFA_FRONT];
        if(img) ctx.drawImage(img, px, py, TILE*2, TILE);
        else { ctx.fillStyle='#7C3AED'; ctx.fillRect(px,py+2,TILE,TILE-4); }
        break;
    case 'whiteboard':
        img=imgCache[WHITEBOARD];
        if(img) ctx.drawImage(img, px, py-TILE, TILE*2, TILE*2);
        else { ctx.fillStyle='#E5E7EB'; ctx.fillRect(px,py,TILE,TILE); }
        break;
    case 'coffee_table':
        img=imgCache[COFFEE_TABLE];
        if(img) ctx.drawImage(img, px, py, TILE*2, TILE*2);
        else { ctx.fillStyle='#78350F'; ctx.fillRect(px+2,py+4,TILE-4,TILE-8); }
        break;
    case 'coffee_machine':
        img=imgCache[COFFEE];
        if(img) ctx.drawImage(img, px, py, TILE, TILE);
        else { ctx.fillStyle='#451A03'; ctx.fillRect(px+2,py+2,TILE-4,TILE-4); }
        break;
    case 'table':
        img=imgCache[TABLE_FRONT];
        if(img) ctx.drawImage(img, 0,0,48,64, px-TILE, py-TILE*1.5, TILE*3, TILE*4);
        else { ctx.fillStyle='#78350F'; ctx.fillRect(px,py,TILE,TILE); }
        break;
    case 'cactus':
        img=imgCache[CACTUS];
        if(img) ctx.drawImage(img, px, py-TILE, TILE, TILE*2);
        else { ctx.fillStyle='#16A34A'; ctx.fillRect(px+5,py+2,TILE-10,TILE-4); }
        break;
    default:
        ctx.fillStyle='#4B5563'; ctx.fillRect(px+2,py+2,TILE-4,TILE-4);
    }
}

function drawAgent(agent) {
    const px=agent.pixelX, py=agent.pixelY;
    const charIdx=agent.charIndex % CHARS.length;
    const charImg=imgCache[CHARS[charIdx]];

    if(charImg) {
        const fw=28, fh=32;
        let row=0;
        if(agent.direction==='up') row=2;
        else if(agent.direction==='left'||agent.direction==='right') row=1;

        const frame=agent.isWalking ? (Math.floor(frameCount/6)%4) : 0;
        const sx=frame*fw, sy=row*fh;

        ctx.globalAlpha=0.3; ctx.fillStyle='#000';
        ctx.beginPath();
        ctx.ellipse(px+TILE/2, py+TILE-2, 6, 3, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;

        const drawW=TILE*1.75, drawH=TILE*2;
        const drawX=px+TILE/2-drawW/2;
        const drawY=py-drawH+TILE;

        if(agent.direction==='right') {
            ctx.save();
            ctx.translate(drawX+drawW, drawY);
            ctx.scale(-1, 1);
            ctx.drawImage(charImg, sx, sy, fw, fh, 0, 0, drawW, drawH);
            ctx.restore();
        } else {
            ctx.drawImage(charImg, sx, sy, fw, fh, drawX, drawY, drawW, drawH);
        }
    } else {
        ctx.fillStyle=agent.color||'#F97316';
        ctx.fillRect(px+2, py-TILE+6, TILE-4, TILE*1.5);
        ctx.fillStyle='#fff';
        ctx.fillRect(px+5, py-TILE+10, 3, 3);
        ctx.fillRect(px+TILE-8, py-TILE+10, 3, 3);
    }

    // Name + level label
    ctx.font='bold 5px monospace';
    ctx.textAlign='center';
    const nameX=px+TILE/2, nameY=py-TILE*0.8-8;
    const lvlText='Lv.'+agent.level;
    const nameText=agent.name.length>12 ? agent.name.substring(0,12)+'...' : agent.name;
    const fullText=nameText+' '+lvlText;
    const tw=ctx.measureText(fullText).width+6;

    ctx.fillStyle='rgba(17,17,22,0.85)';
    ctx.fillRect(nameX-tw/2, nameY-6, tw, 10);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.strokeRect(nameX-tw/2, nameY-6, tw, 10);
    ctx.fillStyle='#E0E0E0';
    ctx.fillText(nameText, nameX-ctx.measureText(' '+lvlText).width/2, nameY+1);
    ctx.fillStyle='#FBBF24';
    ctx.fillText(lvlText, nameX+ctx.measureText(nameText+' ').width/2, nameY+1);

    // Emote bubble
    if(agent.emote) {
        ctx.font='12px sans-serif';
        ctx.textAlign='center';
        const bobY=Math.sin(frameCount*0.08)*1.5;
        const bubbleY=nameY-16+bobY;
        ctx.fillStyle='rgba(255,255,255,0.92)';
        ctx.beginPath();
        ctx.roundRect(nameX-10, bubbleY-11, 20, 18, 6);
        ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,0.15)';
        ctx.lineWidth=0.5;
        ctx.stroke();
        ctx.fillStyle='#000';
        ctx.fillText(agent.emote, nameX, bubbleY+3);
    }

    // Working dots
    if(agent.activity==='coding'||agent.activity==='testing'||agent.activity==='deploying') {
        const dotY=py+TILE+2;
        for(let i=0;i<3;i++) {
            ctx.globalAlpha=Math.sin((frameCount+i*8)*0.1)*0.4+0.6;
            ctx.fillStyle='#34D399';
            ctx.beginPath();
            ctx.arc(px+TILE/2-4+i*4, dotY, 1.5, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha=1;
    }

    // Tool description label (below character)
    if(agent.toolDescription && agent.toolDescription!=='idle' && agent.toolDescription!=='') {
        ctx.font='bold 5px monospace';
        ctx.textAlign='center';
        const descY=py+TILE+8;
        const descW=Math.max(ctx.measureText(agent.toolDescription).width+6, 30);
        ctx.fillStyle='rgba(17,17,22,0.7)';
        ctx.fillRect(nameX-descW/2, descY-5, descW, 9);
        ctx.fillStyle='rgba(255,255,255,0.7)';
        ctx.fillText(agent.toolDescription, nameX, descY+1);
    }
}

// Interactions
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const zoomFactor=e.deltaY>0?0.9:1.1;
    camZoom=Math.max(0.5, Math.min(3.0, camZoom*zoomFactor));
}, {passive:false});

canvas.addEventListener('mousedown', e => {
    if(e.button===0) {
        isDragging=true; dragMoved=false;
        dragStartX=e.clientX; dragStartY=e.clientY;
        dragCamX=camX; dragCamY=camY;
    }
});

canvas.addEventListener('mousemove', e => {
    if(isDragging) {
        const dx=e.clientX-dragStartX, dy=e.clientY-dragStartY;
        if(Math.abs(dx)>3||Math.abs(dy)>3) dragMoved=true;
        camX=dragCamX+dx/camZoom;
        camY=dragCamY+dy/camZoom;
    }
    const worldPos=screenToWorld(e.clientX, e.clientY);
    let found=null;
    for(const agent of agents) {
        const adx=worldPos.x-(agent.pixelX+TILE/2);
        const ady=worldPos.y-(agent.pixelY);
        if(Math.abs(adx)<TILE && Math.abs(ady)<TILE*1.5) { found=agent; break; }
    }
    if(found) {
        tooltip.style.display='block';
        tooltip.style.left=(e.clientX+16)+'px';
        tooltip.style.top=(e.clientY+16)+'px';
        tooltip.querySelector('.name').textContent=found.name+(found.level?' (Lv.'+found.level+')':'');
        tooltip.querySelector('.type').textContent=found.agentType||'agent';
        tooltip.querySelector('.activity').textContent=(found.emote||'')+' '+found.toolDescription;
        canvas.style.cursor='pointer';
    } else {
        tooltip.style.display='none';
        canvas.style.cursor=isDragging?'grabbing':'grab';
    }
});

canvas.addEventListener('mouseup', ()=>{ isDragging=false; });

canvas.addEventListener('click', e => {
    if(dragMoved) return;
    const worldPos=screenToWorld(e.clientX, e.clientY);
    let found=null;
    for(const agent of agents) {
        const adx=worldPos.x-(agent.pixelX+TILE/2);
        const ady=worldPos.y-(agent.pixelY);
        if(Math.abs(adx)<TILE && Math.abs(ady)<TILE*1.5) { found=agent; break; }
    }
    try {
        if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.agentClicked)
            window.webkit.messageHandlers.agentClicked.postMessage(found?found.name:'');
    } catch(err) {}
});

canvas.addEventListener('dblclick', e => {
    const worldPos=screenToWorld(e.clientX, e.clientY);
    for(const agent of agents) {
        const adx=worldPos.x-(agent.pixelX+TILE/2);
        const ady=worldPos.y-(agent.pixelY);
        if(Math.abs(adx)<TILE && Math.abs(ady)<TILE*1.5) {
            camX=-(agent.pixelX-MAP_W/2+TILE/2);
            camY=-(agent.pixelY-MAP_H/2+TILE/2);
            break;
        }
    }
});

function screenToWorld(sx, sy) {
    const cx=canvas.width/2, cy=canvas.height/2;
    return {
        x: (sx-cx)/camZoom + MAP_W/2 - camX,
        y: (sy-cy)/camZoom + MAP_H/2 - camY
    };
}

function findSeat(roomId) {
    for(let i=0;i<seats.length;i++) {
        if(seats[i].room===roomId && !seats[i].occupied) {
            seats[i].occupied=true;
            return seats[i];
        }
    }
    const room=rooms.find(r=>r.id===roomId);
    if(room) return {x:room.x+Math.floor(room.w/2), y:room.y+Math.floor(room.h/2), dir:'down', room:roomId};
    return {x:25, y:15, dir:'down', room:'lounge'};
}

const typeColors={
    'csharp-developer':'#34D399','js-developer':'#FBBF24','swift-developer':'#F97316',
    'kotlin-developer':'#A78BFA','sql-server-expert':'#60A5FA','blazor-architect':'#34D399',
    'api-designer':'#22D3EE','winforms-developer':'#F472B6','tester-qa':'#FBBF24',
    'qa-reviewer':'#FB923C','security-expert':'#EF4444','devops':'#F97316',
    'tech-lead-gestor':'#A78BFA','meta-orchestrator':'#F97316','ux-designer':'#F472B6',
    'performance-optimizer':'#22D3EE'
};

window.updateAgents = function(agentsJSON) {
    seats.forEach(s=>s.occupied=false);
    const data = typeof agentsJSON === 'string' ? JSON.parse(agentsJSON) : agentsJSON;
    const newAgents=[];
    data.forEach((d, idx) => {
        const seat=findSeat(d.zone||'lounge');
        const existing=agents.find(a=>a.name===d.name);
        newAgents.push({
            name: d.name,
            agentType: d.agentType||'general-purpose',
            charIndex: existing ? existing.charIndex : idx,
            pixelX: seat.x*TILE,
            pixelY: seat.y*TILE,
            direction: seat.dir||'down',
            isWalking: false,
            level: d.level||1,
            emote: d.emote||null,
            activity: d.activity||'idling',
            toolDescription: d.toolDescription||'',
            color: typeColors[d.agentType]||'#F97316'
        });
    });
    agents=newAgents;
};

function addDemoAgents() {
    window.updateAgents([
        {name:'backend-dev',agentType:'csharp-developer',zone:'coding',activity:'coding',emote:'\u{1F4BB}',level:3,toolDescription:'implementing UserService'},
        {name:'frontend-dev',agentType:'js-developer',zone:'coding',activity:'coding',emote:'\u{1F4BB}',level:2,toolDescription:'building React components'},
        {name:'db-dev',agentType:'sql-server-expert',zone:'coding',activity:'coding',emote:'\u{1F4BB}',level:2,toolDescription:'writing SQL queries'},
        {name:'tester',agentType:'tester-qa',zone:'testing',activity:'testing',emote:'\u{1F9EA}',level:2,toolDescription:'running xUnit tests'},
        {name:'reviewer',agentType:'qa-reviewer',zone:'library',activity:'reviewing',emote:'\u{1F50D}',level:2,toolDescription:'code review'},
        {name:'lead',agentType:'tech-lead-gestor',zone:'planning',activity:'planning',emote:'\u{1F4AD}',level:4,toolDescription:'coordinating team'},
        {name:'devops-eng',agentType:'devops',zone:'deploying',activity:'deploying',emote:'\u{1F680}',level:2,toolDescription:'Docker pipeline'},
        {name:'sec-expert',agentType:'security-expert',zone:'workshop',activity:'debugging',emote:'\u{1F527}',level:3,toolDescription:'OWASP review'},
    ]);
}

async function init() {
    buildMap();
    await preloadAll();
    camZoom=Math.min(window.innerWidth/MAP_W, window.innerHeight/MAP_H)*0.9;
    setTimeout(()=>{ if(agents.length===0) addDemoAgents(); }, 500);
    render();
}

init();
</script>
